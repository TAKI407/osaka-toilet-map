<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- ▼テスト公開用: 本番ドメイン公開時にこの1行を必ず削除（検索エンジンに載らなくなるため） -->
<meta name="robots" content="noindex">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Osaka Toilet Map 大阪トイレマップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{
  --sign:#16295B;         /* 駅サインの紺 */
  --sign-deep:#0E1C42;
  --paper:#F6F5F1;
  --line:#D9D7CF;
  --ink:#1B1F2A;
  --sub:#6B7080;
  --go:#1F8A5B;           /* 出口サインの緑 */
  --warn:#E2543B;         /* 選択・現在地アクセント */
  --acc-blue:#2E6FD8;
  --radius:14px;
  --shadow:0 6px 24px rgba(14,28,66,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP","Noto Sans SC","Noto Sans KR","Segoe UI",sans-serif;background:var(--paper);color:var(--ink)}
#map{position:fixed;inset:0;z-index:1}
.leaflet-control-attribution{font-size:9px;opacity:.75}

/* ---- top bar ---- */
#topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;padding:10px 12px calc(10px);
  padding-top:max(10px, env(safe-area-inset-top));pointer-events:none}
#brand{pointer-events:auto;display:flex;align-items:center;gap:8px;background:var(--sign);color:#fff;border-radius:10px;
  padding:8px 12px;box-shadow:var(--shadow);font-weight:700;font-size:14px;letter-spacing:.02em;line-height:1.1}
#brand svg{flex:none}
#brand .en{display:block;font-size:9px;font-weight:500;opacity:.75;letter-spacing:.08em;text-transform:uppercase}
#langs{pointer-events:auto;margin-left:auto;display:flex;background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden}
#langs button{border:0;background:transparent;padding:9px 10px;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer}
#langs button.on{background:var(--sign);color:#fff}

/* ---- filter chip ---- */
#chips{position:fixed;z-index:20;left:12px;right:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#chips{top:calc(max(10px, env(safe-area-inset-top)) + 52px)}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:600;color:var(--ink);cursor:pointer;box-shadow:0 2px 8px rgba(14,28,66,.08)}
.chip.on{background:var(--acc-blue);border-color:var(--acc-blue);color:#fff}
#timePill{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:7px 12px;font-size:12px;font-weight:800;color:var(--sign);cursor:pointer;box-shadow:0 2px 8px rgba(14,28,66,.08);font-variant-numeric:tabular-nums}
#timePill.sim{background:var(--warn);border-color:var(--warn);color:#fff}
#legend{display:flex;gap:10px;background:rgba(255,255,255,.92);border-radius:999px;padding:5px 12px;box-shadow:0 2px 8px rgba(14,28,66,.08);flex-wrap:wrap}
#legend span{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--sub)}
#legend i{width:9px;height:9px;border-radius:3px;display:inline-block}
#timePanel{display:none;position:fixed;z-index:25;left:12px;right:12px;top:calc(max(10px, env(safe-area-inset-top)) + 96px);
  background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:14px 16px}
#timePanel .row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
#timePanel .big{font-size:24px;font-weight:800;color:var(--sign);font-variant-numeric:tabular-nums}
#timePanel .cap{font-size:11px;color:var(--sub);font-weight:600}
#timePanel input[type=range]{width:100%;accent-color:var(--warn)}
#timePanel .nowbtn{border:0;background:var(--paper);border:1.5px solid var(--line);border-radius:8px;padding:7px 12px;font-size:12px;font-weight:700;cursor:pointer;color:var(--sign)}

/* ---- locate FAB ---- */
#locate{position:fixed;right:12px;z-index:20;width:44px;height:44px;border-radius:12px;border:0;background:#fff;box-shadow:var(--shadow);
  display:flex;align-items:center;justify-content:center;cursor:pointer}
#locate svg{width:22px;height:22px;fill:var(--sign)}

/* ---- bottom stack ---- */
#stack{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;flex-direction:column;pointer-events:none}
#sheet{pointer-events:auto;background:#fff;border-radius:18px 18px 0 0;box-shadow:0 -8px 30px rgba(14,28,66,.22);overflow:hidden}

/* signature: wayfinding sign band */
#signband{background:linear-gradient(180deg,var(--sign) 0%,var(--sign-deep) 100%);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px}
#signband .picto{flex:none;width:40px;height:40px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center}
#signband .lbl{min-width:0}
#signband .lbl .t{font-size:12px;font-weight:600;opacity:.85;letter-spacing:.04em}
#signband .lbl .n{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.01em}
#signband .dist{margin-left:auto;text-align:right;flex:none}
#signband .dist .d{font-size:26px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.01em;line-height:1}
#signband .dist .w{font-size:11px;opacity:.85;font-weight:600;margin-top:2px}
#signband .arrow{flex:none;font-size:22px;font-weight:800;opacity:.9}

#list{max-height:31vh;overflow-y:auto}
.row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-top:1px solid var(--line);cursor:pointer}
.row:active{background:#F1F3F8}
.row .num{flex:none;width:26px;height:26px;border-radius:50%;background:var(--paper);border:1.5px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--sign)}
.row.sel .num{background:var(--warn);border-color:var(--warn);color:#fff}
.row .info{min-width:0;flex:1}
.row .name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row .sub{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.row .meta{flex:none;text-align:right}
.row .meta .d{font-size:16px;font-weight:800;color:var(--sign);font-variant-numeric:tabular-nums}
.row .meta .w{font-size:10px;color:var(--sub);font-weight:600}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;color:var(--acc-blue);background:#EAF1FC;border-radius:5px;padding:2px 5px;margin-left:6px;vertical-align:1px}

/* detail view */
#detail{display:none}
#detail .body{padding:14px 16px 8px}
#detail .dname{font-size:17px;font-weight:800;line-height:1.3}
#detail .droma{font-size:12px;color:var(--sub);margin-top:2px}
#detail .tags{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.tag{font-size:11px;font-weight:700;border-radius:6px;padding:4px 8px}
.tag.free{background:#E7F4EC;color:var(--go)}
.tag.wc{background:#EAF1FC;color:var(--acc-blue)}
#detail .addr{font-size:12px;color:var(--ink);background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:9px 11px;line-height:1.5}
#detail .addr .cap{font-size:10px;color:var(--sub);font-weight:700;letter-spacing:.05em;display:block;margin-bottom:2px}
#detail .fx{font-size:11px;color:var(--sub);margin-top:8px;line-height:1.5}
#detail .hint{font-size:11px;color:var(--sub);margin-top:8px;display:flex;gap:5px;align-items:flex-start}
.navrow{display:flex;gap:8px;padding:12px 16px 14px}
.navbtn{flex:1;border:0;border-radius:12px;padding:14px 10px;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.navbtn.apple{background:var(--sign);color:#fff}
.navbtn.google{background:#fff;color:var(--sign);border:2px solid var(--sign)}
#backbtn{border:0;background:transparent;color:#fff;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;opacity:.9;padding:4px 0}

/* ad slot */
#ad{pointer-events:auto;background:#ECEAE3;border-top:1px solid var(--line);height:56px;display:flex;align-items:center;justify-content:center;gap:10px;
  padding-bottom:env(safe-area-inset-bottom);position:relative}
#ad .adtag{position:absolute;top:4px;left:6px;font-size:8px;font-weight:700;color:#9A968A;border:1px solid #C9C5B8;border-radius:3px;padding:1px 4px;letter-spacing:.08em}
#ad .fake{display:flex;align-items:center;gap:10px;opacity:.65}
#ad .fake .box{width:38px;height:38px;border-radius:8px;background:repeating-linear-gradient(45deg,#D5D2C6,#D5D2C6 6px,#C9C5B8 6px,#C9C5B8 12px)}
#ad .fake .tx{font-size:11px;color:#7C7869;font-weight:600;line-height:1.35}

/* demo location modal */
#demo{position:fixed;inset:0;z-index:50;background:rgba(14,28,66,.45);display:flex;align-items:flex-end;justify-content:center}
#demo .card{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:560px;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}
#demo h2{font-size:15px;font-weight:800;margin-bottom:4px}
#demo p{font-size:12px;color:var(--sub);margin-bottom:12px}
#demo .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#demo .grid button{border:1.5px solid var(--line);background:var(--paper);border-radius:10px;padding:12px 8px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}
#demo .gps{width:100%;margin-top:8px;border:0;background:var(--sign);color:#fff;border-radius:10px;padding:13px;font-size:13px;font-weight:800;cursor:pointer}

/* toast */
#toast{position:fixed;top:calc(max(10px, env(safe-area-inset-top)) + 96px);left:50%;transform:translateX(-50%);z-index:40;
  background:var(--sign-deep);color:#fff;font-size:12px;font-weight:600;border-radius:999px;padding:8px 14px;box-shadow:var(--shadow);
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}

/* map pins */
.pin{width:30px;height:30px;border-radius:9px;background:var(--sign);border:2.5px solid #fff;box-shadow:0 2px 8px rgba(14,28,66,.4);
  display:flex;align-items:center;justify-content:center;transition:transform .15s}
.pin.acc{background:var(--acc-blue)}
.pin.t1{background:#C77800}
.pin.t2{background:#7A3E9D}
.pin.t3{background:var(--go)}
.pin.off{background:#A8ADB8;opacity:.75}
.pin.sel{background:var(--warn);transform:scale(1.25);z-index:1000!important}
.tag.open{background:#E7F4EC;color:var(--go)}
.tag.closed{background:#EFEFEF;color:#8A8F9C}
.tag.type1{background:#FBF0DC;color:#C77800}
.tag.type2{background:#F2E8F8;color:#7A3E9D}
#detail .verify{font-size:10px;color:#B08A3E;background:#FBF4E2;border-radius:6px;padding:5px 8px;margin-top:8px;line-height:1.5}
.mepin{width:18px;height:18px;border-radius:50%;background:var(--warn);border:3px solid #fff;box-shadow:0 0 0 6px rgba(226,84,59,.25)}
@media (prefers-reduced-motion:no-preference){.mepin{animation:pulse 2s infinite}}
@keyframes pulse{0%{box-shadow:0 0 0 4px rgba(226,84,59,.3)}70%{box-shadow:0 0 0 14px rgba(226,84,59,0)}100%{box-shadow:0 0 0 4px rgba(226,84,59,0)}}
.credit{position:fixed;left:0;right:0;bottom:0;z-index:2}
</style>
</head>
<body>
<div id="map"></div>

<div id="topbar">
  <div id="brand">
    <svg width="22" height="26" viewBox="0 0 100 120"><path d="M50 4C25 4 8 22 8 45c0 15 8 26 18 33l24 38 24-38c10-7 18-18 18-33C92 22 75 4 50 4z" fill="#4CBF8B"/><circle cx="50" cy="44" r="30" fill="#fff"/><circle cx="38" cy="32" r="7.5" fill="#2E6FD8"/><rect x="31" y="41" width="14" height="24" rx="6" fill="#2E6FD8"/><circle cx="62" cy="32" r="7.5" fill="#E2543B"/><path d="M62 41 L51 64 L73 64 Z" fill="#E2543B"/></svg>

</div>

<div id="chips">

  <button id="timePill">🕐 --:--</button>

</div>

<div id="timePanel">

</div>

<div id="stack">
  <div id="sheet">

      <div class="lbl"><div class="t" id="bandT"></div><div class="n" id="bandN">—</div></div>
      <div class="dist"><div class="d" id="bandD">—</div><div class="w" id="bandW"></div></div>
      <div class="arrow">➜</div>
    </div>
    <div id="list"></div>
    <div id="detail">
      <div class="body">
        <div class="dname" id="dName"></div>
        <div class="droma" id="dRoma"></div>
        <div class="tags" id="dTags"></div>
        <div class="addr"><span class="cap" id="dAddrCap"></span><span id="dAddr"></span></div>

      </div>
      <div class="navrow">
        <button class="navbtn apple" id="navApple"> <span id="navLbl1"></span></button>
        <button class="navbtn google" id="navGoogle">G <span id="navLbl2"></span></button>
      </div>
    </div>
  </div>
  <div id="ad">
    <span class="adtag" id="adTag">AD</span>
    <div class="fake"><div class="box"></div><div class="tx" id="adTx">Ad space 320×50<br>AdSense / affiliate banner</div></div>
  </div>
</div>

<div id="demo">
  <div class="card">
    <h2 id="demoT"></h2>
    <p id="demoP"></p>
    <div class="grid" id="demoGrid"></div>
    <button class="gps" id="demoGps"></button>
  </div>
</div>

<div id="toast"></div>

};
const DEMOS = [
 ['梅田 Umeda',34.7025,135.4959],['なんば Namba',34.6635,135.5023],
 ['道頓堀 Dotonbori',34.6687,135.5013],['天王寺 Tennoji',34.6465,135.5136],
 ['大阪城 Osaka Castle',34.6873,135.5262],['新世界 Shinsekai',34.6525,135.5063]
];

/* 統合リスト: {name, roma, lat, lng, wc, addr, fx, type, open, close, floor} */
const ALL = [];
TOILETS.forEach(t=>ALL.push({name:t[0],roma:t[1],lat:t[2],lng:t[3],wc:t[4],addr:t[5],fx:t[6],type:0,open:0,close:1440,floor:''}));
SHOPS.forEach(s=>ALL.push({name:s[0],roma:s[1],lat:s[2],lng:s[3],wc:s[4],addr:s[5],floor:s[6],open:s[7],close:s[8],type:s[9],fx:''}));

let lang = (nav => nav.startsWith('ja')?'ja':nav.startsWith('zh')?'zh':nav.startsWith('ko')?'ko':'en')(navigator.language||'en');
let me = null, accOnly = false, selIdx = -1, markers = [], meMarker = null, circle = null, nearest = [];
let simMin = null; // null = 実時刻

const map = L.map('map',{zoomControl:false}).setView([34.6812,135.5100],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  attribution:'&copy; OpenStreetMap &copy; CARTO | データ: 大阪市 (CC BY)',maxZoom:19}).addTo(map);

const $ = id => document.getElementById(id);
const T = k => STR[lang][k];
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}
function hav(a,b,c,d){const R=6371000,p=Math.PI/180,x=Math.sin((c-a)*p/2),y=Math.sin((d-b)*p/2);
  return 2*R*Math.asin(Math.sqrt(x*x+Math.cos(a*p)*Math.cos(c*p)*y*y));}
function fmtD(m){return m<1000?Math.round(m)+'m':(m/1000).toFixed(1)+'km';}
function walkMin(m){return T('min').replace('{n}',Math.max(1,Math.round(m/80)));}
function nowMin(){ if(simMin!==null) return simMin;
  const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function fmtT(min){return String(Math.floor(min/60)).padStart(2,'0')+':'+String(min%60).padStart(2,'0');}
function isOpen(it){ if(it.type===0||it.type===3) return true;
  const t=nowMin(); return t>=it.open && t<it.close; }
function hoursStr(it){ return it.type===3 ? '24h' : fmtT(it.open)+'–'+fmtT(it.close); }

const TOILET_SVG = '<svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><circle cx="7.5" cy="4.4" r="2.1"/><path d="M5.2 7.2h4.6c.9 0 1.5.6 1.5 1.5v5h-1.6v8h-4.4v-8H3.7v-5c0-.9.6-1.5 1.5-1.5z"/><circle cx="17" cy="4.4" r="2.1"/><path d="M17 7c1 0 1.7.5 2 1.4l1.9 5.6h-1.9l1.2 3.7h-2.4v4h-3.6v-4h-2.4l1.2-3.7h-1.9l1.9-5.6c.3-.9 1-1.4 2-1.4z"/></svg>';
function pinIcon(it,sel){
  const open=isOpen(it);
  const cls = sel?' sel' : !open?' off' : it.type===1?' t1' : it.type===2?' t2' : it.type===3?' t3' : '';
  return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],
   html:`<div class="pin${cls}">${TOILET_SVG}</div>`});
}
function visible(it){ return !(accOnly && !it.wc); }
function drawMarkers(){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  ALL.forEach((it,i)=>{
    if(!visible(it)) return;
    const m=L.marker([it.lat,it.lng],{icon:pinIcon(it, i===selIdx),zIndexOffset:isOpen(it)?100:0}).addTo(map);
    m.on('click',()=>select(i,true)); markers.push(m);
  });
}
function setMe(lat,lng,label){
  me=[lat,lng];
  if(meMarker) map.removeLayer(meMarker);
  if(circle) map.removeLayer(circle);
  meMarker=L.marker(me,{icon:L.divIcon({className:'',iconSize:[18,18],iconAnchor:[9,9],html:'<div class="mepin"></div>'}),zIndexOffset:900}).addTo(map);
  circle=L.circle(me,{radius:300,color:'#E2543B',weight:1.5,dashArray:'5 6',fillColor:'#E2543B',fillOpacity:.06}).addTo(map);
  refresh(); map.setView(me,15);
  if(label) toast(label);
}
function refresh(){
  updateTimeUI();
  if(!me){ drawMarkers(); return; }
  const pool = ALL.map((it,i)=>({i,it,d:hav(me[0],me[1],it.lat,it.lng)}))
    .filter(x=>visible(x.it) && isOpen(x.it)).sort((a,b)=>a.d-b.d);
  nearest = pool.slice(0,3);
  if(nearest.length){
    const n=nearest[0];
    $('bandN').textContent = n.it.roma && lang!=='ja' ? n.it.roma : n.it.name;
    $('bandD').textContent = fmtD(n.d);
    $('bandW').textContent = walkMin(n.d);
  } else { $('bandN').textContent='—'; $('bandD').textContent='—'; $('bandW').textContent=''; }
  const list=$('list'); list.innerHTML='';
  nearest.forEach((x,rank)=>{
    const r=document.createElement('div');
    r.className='row'+(x.i===selIdx?' sel':'');
    const nm = lang==='ja'? x.it.name : (x.it.roma||x.it.name);
    const sub = (x.it.type>0 ? T('t'+x.it.type)+' · '+hoursStr(x.it)+' · ' : '') + (lang==='ja'? (x.it.roma||x.it.addr) : x.it.name);
    r.innerHTML=`<div class="num">${rank+1}</div>
      <div class="info"><div class="name">${nm}${x.it.wc?'<span class="badge">♿</span>':''}</div>
      <div class="sub">${sub}</div></div>
      <div class="meta"><div class="d">${fmtD(x.d)}</div><div class="w">${walkMin(x.d)}</div></div>`;
    r.onclick=()=>select(x.i,true);
    list.appendChild(r);
  });
  drawMarkers();
}
function select(i,openDetail){
  selIdx=i; const it=ALL[i];
  refresh();
  if(openDetail){
    $('list').style.display='none'; $('detail').style.display='block';
    $('dName').textContent=it.name;
    $('dRoma').textContent=it.roma;
    let tags='';
    if(it.type===0) tags+=`<span class="tag free">${T('free')}</span>`;
    else {
      tags+=`<span class="tag type${Math.min(it.type,2)}">${T('t'+it.type)}</span>`;
      tags+=`<span class="tag ${isOpen(it)?'open':'closed'}">${isOpen(it)?T('open'):T('closed')} · ${hoursStr(it)}</span>`;
    }
    if(it.wc) tags+=`<span class="tag wc">♿ ${T('wc')}</span>`;
    $('dTags').innerHTML=tags;
    $('dAddrCap').textContent=T('addr');
    $('dAddr').textContent=it.addr + (it.floor?` ｜ ${T('floor')}: ${it.floor}`:'');
    $('dFx').textContent=it.fx?T('fx')+': '+it.fx:'';
    const v=$('dVerify');
    if(it.type>0){ v.style.display='block'; v.textContent=T('verify'); } else v.style.display='none';
    $('dHint').textContent=T('hint');
    const d=me?hav(me[0],me[1],it.lat,it.lng):null;
    $('bandN').textContent = lang==='ja'? it.name : (it.roma||it.name);
    $('bandD').textContent = d?fmtD(d):'—';
    $('bandW').textContent = d?walkMin(d):'';
    map.setView([it.lat,it.lng],17);
    $('navApple').onclick=()=>window.open(`https://maps.apple.com/?daddr=${it.lat},${it.lng}&dirflg=w`,'_blank');
    $('navGoogle').onclick=()=>window.open(`https://www.google.com/maps/dir/?api=1&destination=${it.lat},${it.lng}&travelmode=walking`,'_blank');
  }
}
function closeDetail(){selIdx=-1;$('detail').style.display='none';$('list').style.display='block';refresh();}

/* 時刻シミュレーター */
function updateTimeUI(){
  const t=nowMin();
  $('timePill').textContent='🕐 '+fmtT(t);
  $('timePill').classList.toggle('sim',simMin!==null);
  $('tpTime').textContent=fmtT(t);
  $('tpRange').value=t;
}
$('timePill').onclick=()=>{const p=$('timePanel');p.style.display=p.style.display==='block'?'none':'block';updateTimeUI();};
$('tpRange').oninput=e=>{simMin=parseInt(e.target.value,10);closeDetailIfClosed();refresh();};
$('tpNow').onclick=()=>{simMin=null;$('timePanel').style.display='none';refresh();};
function closeDetailIfClosed(){ if(selIdx>=0 && ALL[selIdx].type>0 && !isOpen(ALL[selIdx])){} }

function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll('#langs button').forEach(b=>b.classList.toggle('on',b.dataset.l===lang));
  $('ttl').textContent=T('ttl');
  $('bandT').textContent=T('near');
  $('accLbl').textContent=T('acc');
  $('demoT').textContent=T('demoT');$('demoP').textContent=T('demoP');$('demoGps').textContent=T('gps');
  $('navLbl1').textContent=T('nav1');$('navLbl2').textContent=T('nav2');
  $('adTag').textContent=T('ad');
  $('tpCap').textContent=T('tpCap');$('tpNow').textContent=T('now');
  $('legend').innerHTML=
    `<span><i style="background:#16295B"></i>${T('t0')}</span>`+
    `<span><i style="background:#C77800"></i>${T('t1')}</span>`+
    `<span><i style="background:#7A3E9D"></i>${T('t2')}</span>`+
    `<span><i style="background:#1F8A5B"></i>${T('t3')}</span>`+
    `<span><i style="background:#A8ADB8"></i>${T('closed')}</span>`;
  refresh();
}
document.querySelectorAll('#langs button').forEach(b=>b.onclick=()=>{lang=b.dataset.l;applyLang();});

$('accChip').onclick=()=>{accOnly=!accOnly;$('accChip').classList.toggle('on',accOnly);
  toast(accOnly?T('noacc'):T('all'));closeDetail();};

$('signband').onclick=()=>{ if($('detail').style.display==='block'){closeDetail();} else if(nearest.length){select(nearest[0].i,true);} };

map.on('click',e=>{ $('timePanel').style.display='none'; setMe(e.latlng.lat,e.latlng.lng); closeDetail(); });

function tryGPS(fromBtn){
  if(!navigator.geolocation){ if(fromBtn)toast(T('gpsng')); return; }
  navigator.geolocation.getCurrentPosition(
    p=>{ $('demo').style.display='none'; setMe(p.coords.latitude,p.coords.longitude); closeDetail(); },
    e=>{ toast(T(e && e.code===1 ? 'gpsdeny' : 'gpsng')); },
    {enableHighAccuracy:true,timeout:10000,maximumAge:15000});
}
$('locate').onclick=()=>tryGPS(true);
$('demoGps').onclick=()=>tryGPS(true);

DEMOS.forEach(d=>{
  const b=document.createElement('button');b.textContent=d[0];
  b.onclick=()=>{$('demo').style.display='none';setMe(d[1],d[2]);toast(T('tap'));};
  $('demoGrid').appendChild(b);
});

setInterval(()=>{ if(simMin===null) updateTimeUI(); },30000);
applyLang();

</script>
